# Development Docker Compose for Agent Grey
#
# This setup handles the recent migration fixes:
# 1. Fresh database setup with clean volumes
# 2. Automatic migration 0007 fake application (UUID state correction)
# 3. Complete 45+ migration chain across 7 Django apps
# 4. UUID system validation and proper primary key handling
#
# For fresh start: docker-compose -f docker-compose.dev.yml down -v
# Then: docker-compose -f docker-compose.dev.yml up --build

# Explicit project name — prevents namespace collision with the production
# deployment stack. Both files
# otherwise default to project=agent-grey (derived from directory basename),
# which causes Docker Compose to treat the other stack's containers as
# orphans and creates zombie containers.
name: agent-grey-dev

# Hardening (TH PMD #970, follow-up to a231848):
# - Host ports bound to 127.0.0.1 only — use an SSH tunnel for remote access.
# - debugpy 5678 intentionally not host-bound — use
#   `docker compose exec web python -m debugpy ...` if you need to attach.
# See .claude/rules/custom/deploy-verify.md and no-local-compose.md.

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-thesis_grey_dev_db}
      - POSTGRES_USER=${POSTGRES_USER:-thesis_grey_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env.dev.local}
      # Enable UUID extension for PostgreSQL
      - POSTGRES_INITDB_ARGS=--auth-host=md5
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thesis_grey_user} -d ${POSTGRES_DB:-thesis_grey_dev_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - dev_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot frontend asset build. The dev `web` image (Dockerfile.dev) has
  # no Vite stage, and the live bind-mount of the repo at /app would shadow
  # any assets baked into the image anyway. So build the Vite bundle on the
  # host side: this runs `vite build` into the bind-mounted static/dist (where
  # django-vite reads static/dist/.vite/manifest.json) and then EXITS. `web`
  # waits for it via depends_on: service_completed_successfully, so the
  # manifest always exists before Django serves a request.
  #
  # Re-run after changing anything under frontend/:
  #   docker compose -f docker-compose.development.yml up frontend-build
  # Uses `npx vite build` (matches the production Dockerfile) rather than
  # `npm run build`, which also runs `vue-tsc` and can fail on type errors.
  frontend-build:
    image: node:22-slim
    working_dir: /app/frontend
    volumes:
      - ${PROJECT_PATH:-.}:/app
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "npm ci --ignore-scripts && npx vite build"
    networks:
      - dev_network
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
      cache_from:
        - python:3.12-slim
    command: runserver
    volumes:
      # Live code reloading
      - ${PROJECT_PATH:-.}:/app
      - dev_media_volume:/app/media
      - staticfiles_volume:/app/staticfiles
      # Preserve pip cache for faster rebuilds
      - pip_cache:/root/.cache/pip
      # Keep the host node_modules out of /app/static/dist's way — the
      # frontend-build service owns it via the frontend_node_modules volume.
      - frontend_node_modules:/app/frontend/node_modules
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.dev.local
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.local
      - DATABASE_URL=postgres://${POSTGRES_USER:-thesis_grey_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-thesis_grey_dev_db}
      # REDIS_URL drives the Django cache LOCATION in settings/local.py. Without
      # it the cache falls back to redis://localhost:6379/0, which is unreachable
      # from inside the container (Redis is the `redis` service), so the cache
      # silently degrades to the DB backend. Point it at the in-network host.
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - DEPLOYMENT_TYPE=docker
      - ENVIRONMENT_LOCKED=true  # Prevent runtime overrides (Issue #109)
      - CREATE_SUPERUSER=true
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=${FLOWER_ADMIN_PASSWORD:?set in .env.dev.local}
      - ADMIN_EMAIL=admin@localhost
      - TZ=UTC
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,172.18.0.0/16,web
      # Quiet mode defaults (reduced log noise)
      # For verbose debugging: DEV_REQUEST_LOGGING=all APP_LOG_LEVEL=DEBUG docker-compose up
      - APP_LOG_LEVEL=WARNING
      - DEV_REQUEST_LOGGING=errors_only
      # Explicitly set SENTRY_DSN from .env.dev.local
      - SENTRY_DSN=${SENTRY_DSN:-https://0d1d5b4f6155f3852377e3052a2016ea@o4509521826742272.ingest.de.sentry.io/4509810659360848}
      # PostHog Product Analytics (EU Cloud)
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://eu.i.posthog.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    networks:
      - dev_network
    restart: unless-stopped
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      # start_period MUST be longer than actual startup time
      # Current startup: ~8 minutes (migrations + initialization)
      # Buffer: +120 seconds for safety
      start_period: 600s  # 10 minutes
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
      cache_from:
        - python:3.12-slim
    command: worker
    volumes:
      - ${PROJECT_PATH:-.}:/app
      - dev_media_volume:/app/media
      - pip_cache:/root/.cache/pip
    env_file:
      - .env.dev.local
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.local
      - DATABASE_URL=postgres://${POSTGRES_USER:-thesis_grey_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-thesis_grey_dev_db}
      - REDIS_URL=redis://redis:6379/0  # see web service note; cache LOCATION fallback
      - ENVIRONMENT=development
      - DEPLOYMENT_TYPE=docker
      - ENVIRONMENT_LOCKED=true  # Prevent runtime overrides (Issue #109)
      - CELERY_CONCURRENCY=2
      - TZ=UTC
      - WORKER_TYPE=celery
      # Explicitly set SENTRY_DSN from .env.dev.local
      - SENTRY_DSN=${SENTRY_DSN:-https://0d1d5b4f6155f3852377e3052a2016ea@o4509521826742272.ingest.de.sentry.io/4509810659360848}
      # PostHog Product Analytics (EU Cloud)
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://eu.i.posthog.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - dev_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A grey_lit_project inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat:
    profiles: [scheduler]
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
      cache_from:
        - python:3.12-slim
    command: beat
    volumes:
      - ${PROJECT_PATH:-.}:/app
      - dev_media_volume:/app/media
      - pip_cache:/root/.cache/pip
    env_file:
      - .env.dev.local
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.local
      - DATABASE_URL=postgres://${POSTGRES_USER:-thesis_grey_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-thesis_grey_dev_db}
      - TZ=UTC
      - WORKER_TYPE=web
      - ENVIRONMENT=development
      - DEPLOYMENT_TYPE=docker
      - ENVIRONMENT_LOCKED=true  # Prevent runtime overrides (Issue #109)
      # Explicitly set SENTRY_DSN from .env.dev.local
      - SENTRY_DSN=${SENTRY_DSN:-https://0d1d5b4f6155f3852377e3052a2016ea@o4509521826742272.ingest.de.sentry.io/4509810659360848}
      # PostHog Product Analytics (EU Cloud)
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://eu.i.posthog.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_healthy
    networks:
      - dev_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; import sys; sys.exit(0 if 'beat' in ' '.join(os.popen('ps aux 2>/dev/null || echo celery-beat').read().split()) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  flower:
    profiles: [monitoring]
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
      cache_from:
        - python:3.12-slim
    command: flower
    volumes:
      - ${PROJECT_PATH:-.}:/app
      - pip_cache:/root/.cache/pip
    env_file:
      - .env.dev.local
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.local
      - DATABASE_URL=postgres://${POSTGRES_USER:-thesis_grey_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-thesis_grey_dev_db}
      - ENVIRONMENT=development
      - DEPLOYMENT_TYPE=docker
      - ENVIRONMENT_LOCKED=true  # Prevent runtime overrides (Issue #109)
      - FLOWER_PORT=5555
      - FLOWER_UNAUTHENTICATED_API=true  # For health check access
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      celery_worker:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5555/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    profiles: [proxy]
    image: nginx:1.25-alpine
    volumes:
      - dev_media_volume:/app/media
      - staticfiles_volume:/app/staticfiles
    ports:
      - "127.0.0.1:8800:80"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - dev_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'EOF'
        upstream web {
            server web:8000;
        }
        server {
            listen 80;
            server_name localhost;
            client_max_body_size 100M;
            location / {
                proxy_pass http://web;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header Host $$host;
                proxy_set_header X-Real-IP $$remote_addr;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_redirect off;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $$http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;
            }
            location /static/ {
                alias /app/staticfiles/;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            location /media/ {
                alias /app/media/;
                expires 1y;
                add_header Cache-Control "public";
            }
            location /nginx-health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
            add_header X-XSS-Protection "1; mode=block";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            gzip on;
            gzip_types text/plain text/css text/js text/xml text/javascript application/javascript application/xml+rss application/json;
        }
        EOF
        exec nginx -g 'daemon off;'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Standalone warning monitor service for development
  warning_monitor:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
      cache_from:
        - python:3.12-slim
    volumes:
      - ./logs/sentry:/app/logs/sentry
      - ${PROJECT_PATH:-.}:/app
    environment:
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_ENVIRONMENT=docker_development
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.local
    command: python scripts/system_warning_monitor.py --process-monitor
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - dev_network
    restart: unless-stopped
    profiles:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Development database admin tool (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@localhost
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:?set in .env.dev.local}
      - PGADMIN_LISTEN_PORT=80
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dev_network
    profiles:
      - admin
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_dev_data:
  redis_dev_data:
  dev_media_volume:
  staticfiles_volume:
  pip_cache:
  frontend_node_modules:  # node_modules for the frontend-build service (off the host bind-mount)

networks:
  dev_network:
    driver: bridge

# Development profiles:
# Default: web, db, redis, celery_worker (4 containers)
# With scheduler: docker-compose --profile scheduler up (adds celery_beat)
# With monitoring: docker-compose --profile monitoring up (adds flower)
# With proxy: docker-compose --profile proxy up (adds nginx)
# With admin tools: docker-compose --profile admin up (adds pgadmin)
# All services: docker-compose --profile admin --profile monitoring --profile scheduler --profile proxy up
#
# Notes:
# - All services use consistent credentials from .env.dev.local
# - Database volumes are persistent across rebuilds
# - Fresh start: docker-compose -f docker-compose.dev.yml down -v
