[tool:pytest]
# Pytest configuration for Agent Grey Playwright testing

# Django settings
DJANGO_SETTINGS_MODULE = grey_lit_project.settings.test
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Test discovery
testpaths = tests

# Markers for test categorization
markers =
    playwright: Playwright browser tests
    integration: Integration tests
    api: API integration tests
    slow: Slow running tests
    unit: Unit tests
    e2e: End-to-end tests
    workflow: Workflow tests
    auth: Authentication tests
    celery: Celery/background task tests

# Pytest plugins
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --durations=10
    --maxfail=5
    --reuse-db
    --nomigrations
    --capture=no
    --live-server-host=127.0.0.1
    --live-server-port=8081-8100
    --asyncio-mode=auto

# Test filtering
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore:.*USE_TZ.*:django.utils.timezone
    ignore:.*django.contrib.auth.*:PendingDeprecationWarning

# Minimum version requirements
minversion = 6.0

# Parallel execution
# Uncomment to enable parallel test execution
# -n auto

# Coverage (if pytest-cov is installed)
# --cov=apps
# --cov-report=html
# --cov-report=term-missing
# --cov-fail-under=80

# Django-specific options
django_find_project = false