# Nginx configuration for Agent Grey production deployment
upstream web {
    server web:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 100M;

    # Main application proxy
    location / {
        proxy_pass http://web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://web/health/;
        access_log off;
    }

    # SSE (Server-Sent Events) for real-time updates
    # Disable buffering to allow real-time streaming
    location ~ ^/api/conflicts/.+/stream/$ {
        proxy_pass http://web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-specific configuration
        proxy_set_header X-Accel-Buffering no;  # Disable Nginx buffering
        proxy_buffering off;                     # Disable proxy buffering
        proxy_cache off;                         # Disable caching
        proxy_read_timeout 600s;                 # 10 minute timeout
        chunked_transfer_encoding off;           # SSE uses chunked encoding

        # Keep-alive for long connections
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}
