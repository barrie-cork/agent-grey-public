{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="rounded-lg border border-border bg-card shadow-lg">
            <div class="p-8">
                <div class="text-center mb-6">
                    <img src="{% static 'images/agent-grey-logo-login.png' %}" alt="Agent Grey" class="mx-auto mb-4" style="height: 160px;">
                    <h2 class="text-2xl font-semibold text-foreground">{% block auth_title %}{% endblock %}</h2>
                </div>
                <div>
                    {% block auth_content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
