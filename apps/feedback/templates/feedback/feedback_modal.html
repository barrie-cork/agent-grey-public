<!-- Feedback Modal -->
<div class="fixed inset-0 z-50 hidden" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true" data-testid="feedback-modal" data-no-screenshot>
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm" data-modal-backdrop></div>
    <div class="fixed inset-0 overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4">
            <div class="relative w-full max-w-2xl bg-white rounded-lg shadow-xl">
                <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                    <h5 class="text-lg font-semibold flex items-center" id="feedbackModalLabel">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 16 16"><path d="M2.678 11.894a1 1 0 0 1 .287.801 10.97 10.97 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8.06 8.06 0 0 0 8 14c3.996 0 7-2.807 7-6 0-3.192-3.004-6-7-6S1 4.808 1 8c0 1.468.617 2.83 1.678 3.894zm-.493 3.905a21.682 21.682 0 0 1-.713.129c-.2.032-.352-.176-.273-.362a9.68 9.68 0 0 0 .244-.637l.003-.01c.248-.72.45-1.548.524-2.319C.743 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7-3.582 7-8 7a9.06 9.06 0 0 1-2.347-.306c-.52.263-1.639.742-3.468 1.105z"/></svg>
                        Share Your Feedback
                    </h5>
                    <button type="button" class="text-gray-400 hover:text-gray-600" data-modal-close aria-label="Close">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="px-6 py-4">
                    <!-- Success/Error Messages -->
                    <div id="feedbackMessages" class="alert-container mb-4 hidden"></div>

                    <!-- Voice Transcription Display -->
                    <div class="feedback-transcription-section mb-4 hidden">
                        <div class="flex items-center gap-2 mb-1">
                            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-14 0m7 7v4m-4 0h8m-4-16a3 3 0 00-3 3v4a3 3 0 006 0V6a3 3 0 00-3-3z"></path></svg>
                            <span class="text-sm font-medium text-blue-700">Voice Recording</span>
                            <span id="feedbackAudioDuration" class="text-xs text-gray-500 hidden"></span>
                        </div>
                        <div id="feedbackTranscription" class="bg-blue-50 border border-blue-100 rounded-md p-3 text-sm text-gray-700"></div>
                    </div>

                    <!-- Feedback Form -->
                    <form id="feedbackForm">
                        <!-- Page Context (Hidden) -->
                        <input type="hidden" id="feedbackPagePath" name="page_path">
                        <input type="hidden" id="feedbackPageTitle" name="page_title">

                        <!-- Feedback Type -->
                        <div class="mb-4">
                            <label for="feedbackType" class="block text-sm font-medium text-gray-700 mb-1">
                                <strong>What type of feedback do you have?</strong>
                                <span class="text-red-500">*</span>
                            </label>
                            <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="feedbackType" name="feedback_type" required data-testid="input-feedback-type">
                                <option value="">Please select...</option>
                                <option value="bug">Bug Report - Something isn't working</option>
                                <option value="idea">Feature Idea - I have an idea</option>
                                <option value="suggestion">Suggestion - This could be better</option>
                                <option value="general">General Feedback</option>
                            </select>
                        </div>

                        <!-- Severity (shown for bug/idea/suggestion, hidden for general) -->
                        <div id="severitySection" class="mb-4 hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                <strong id="severityLabel">How important?</strong>
                                <span class="text-red-500">*</span>
                            </label>
                            <div class="flex gap-3">
                                <label class="flex-1 cursor-pointer">
                                    <input type="radio" name="severity" value="must_have" class="sr-only peer">
                                    <div class="text-center px-3 py-2 border border-gray-300 rounded-md text-sm peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-700 hover:bg-gray-50 transition-colors">
                                        Must Have
                                    </div>
                                </label>
                                <label class="flex-1 cursor-pointer">
                                    <input type="radio" name="severity" value="should_have" class="sr-only peer">
                                    <div class="text-center px-3 py-2 border border-gray-300 rounded-md text-sm peer-checked:border-yellow-500 peer-checked:bg-yellow-50 peer-checked:text-yellow-700 hover:bg-gray-50 transition-colors">
                                        Should Have
                                    </div>
                                </label>
                                <label class="flex-1 cursor-pointer">
                                    <input type="radio" name="severity" value="nice_to_have" class="sr-only peer">
                                    <div class="text-center px-3 py-2 border border-gray-300 rounded-md text-sm peer-checked:border-green-500 peer-checked:bg-green-50 peer-checked:text-green-700 hover:bg-gray-50 transition-colors">
                                        Nice to Have
                                    </div>
                                </label>
                            </div>
                        </div>

                        <!-- Subject Line -->
                        <div class="mb-4">
                            <label for="feedbackSubject" class="block text-sm font-medium text-gray-700 mb-1">
                                <strong>Subject</strong>
                                <small class="text-gray-500">(optional)</small>
                            </label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="feedbackSubject" name="subject"
                                   placeholder="Brief summary of your feedback" maxlength="200" data-testid="input-feedback-subject">
                        </div>

                        <!-- Message -->
                        <div class="mb-4">
                            <label for="feedbackMessage" class="block text-sm font-medium text-gray-700 mb-1">
                                <strong>Your Feedback</strong>
                                <span id="messageRequiredStar" class="text-red-500">*</span>
                            </label>
                            <textarea class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="feedbackMessage" name="message" rows="4"
                                      placeholder="Please share your detailed feedback here..." data-testid="input-feedback-message"></textarea>
                            <p class="mt-1 text-sm text-gray-500">
                                <span id="messageCharCount">0</span>/2000 characters
                            </p>
                        </div>

                        <!-- Bug-Specific Fields -->
                        <div id="bugSpecificFields" class="hidden space-y-4 mb-4">
                            <div>
                                <label for="feedbackExpectedBehaviour" class="block text-sm font-medium text-gray-700 mb-1">
                                    <strong>Expected Behaviour</strong>
                                </label>
                                <textarea class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="feedbackExpectedBehaviour" name="expected_behaviour" rows="2"
                                          placeholder="What did you expect to happen?" maxlength="500"></textarea>
                            </div>
                            <div>
                                <label for="feedbackActualBehaviour" class="block text-sm font-medium text-gray-700 mb-1">
                                    <strong>Actual Behaviour</strong>
                                </label>
                                <textarea class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="feedbackActualBehaviour" name="actual_behaviour" rows="2"
                                          placeholder="What actually happened?" maxlength="500"></textarea>
                            </div>
                            <div>
                                <label for="feedbackFrequency" class="block text-sm font-medium text-gray-700 mb-1">
                                    <strong>How often does this happen?</strong>
                                </label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="feedbackFrequency" name="frequency">
                                    <option value="">Select frequency...</option>
                                    <option value="always">Always - Every time I try</option>
                                    <option value="sometimes">Sometimes - It happens occasionally</option>
                                    <option value="once">Once - It only happened once</option>
                                </select>
                            </div>
                        </div>

                        <!-- Screenshot Preview -->
                        <div id="screenshotPreviewContainer" class="mb-4 hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <strong>Screenshot</strong>
                            </label>
                            <div class="relative inline-block">
                                <img id="screenshotPreviewImg" class="max-h-32 rounded-md border border-gray-200 shadow-sm" alt="Page screenshot">
                                <button type="button" id="removeScreenshotBtn" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs hover:bg-red-600" title="Remove screenshot">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                            </div>
                        </div>

                        <!-- Rating -->
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <strong>Rate Your Experience</strong>
                                <small class="text-gray-500">(optional)</small>
                            </label>
                            <div class="rating-container">
                                <div class="star-rating">
                                    <input type="radio" id="star5" name="rating" value="5">
                                    <label for="star5" title="5 stars - Excellent">&#9733;</label>

                                    <input type="radio" id="star4" name="rating" value="4">
                                    <label for="star4" title="4 stars - Very Good">&#9733;</label>

                                    <input type="radio" id="star3" name="rating" value="3">
                                    <label for="star3" title="3 stars - Good">&#9733;</label>

                                    <input type="radio" id="star2" name="rating" value="2">
                                    <label for="star2" title="2 stars - Fair">&#9733;</label>

                                    <input type="radio" id="star1" name="rating" value="1">
                                    <label for="star1" title="1 star - Poor">&#9733;</label>
                                </div>
                                <div class="rating-text">
                                    <small class="text-gray-500">Click stars to rate your experience</small>
                                </div>
                            </div>
                        </div>

                        <!-- Contact Email -->
                        <div class="mb-4">
                            <label for="feedbackContactEmail" class="block text-sm font-medium text-gray-700 mb-1">
                                <strong>Contact Email</strong>
                                <small class="text-gray-500">(optional, for follow-up)</small>
                            </label>
                            <input type="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500" id="feedbackContactEmail" name="contact_email"
                                   placeholder="your.email@example.com">
                        </div>

                        <!-- Current Page Info Display -->
                        <div class="mb-4">
                            <div class="bg-gray-100 rounded-lg p-4">
                                <small class="text-gray-500">
                                    <strong>Page Context:</strong>
                                    <span id="currentPageDisplay">Loading...</span>
                                </small>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-200">
                    <button type="button" class="inline-flex items-center px-4 py-2 border border-gray-300 text-gray-700 font-medium rounded-md hover:bg-gray-50" data-modal-close data-testid="cancel-feedback-btn">
                        <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>
                        Cancel
                    </button>
                    <button type="submit" class="inline-flex items-center px-4 py-2 bg-primary text-primary-foreground font-medium rounded-md shadow-sm hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-ring focus:ring-offset-2" id="submitFeedbackBtn" form="feedbackForm" data-testid="submit-feedback-btn">
                        <span class="submit-text flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 16 16"><path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11zM6.636 10.07l2.761 4.338L14.13 2.576 6.636 10.07zm6.787-8.201L1.591 6.602l4.339 2.76 7.494-7.493z"/></svg>
                            Send Feedback
                        </span>
                        <span class="loading-text hidden">
                            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            Sending...
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Feedback Success Toast -->
<div class="fixed bottom-4 right-4 z-50 hidden" id="feedbackToast" role="alert" data-testid="feedback-toast">
    <div class="bg-white rounded-lg shadow-lg border border-gray-200 overflow-hidden max-w-sm">
        <div class="flex items-center gap-2 px-4 py-3 border-b border-gray-100">
            <svg class="w-5 h-5 text-green-500 mr-2" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>
            <strong class="flex-1">Feedback Sent</strong>
            <button type="button" class="text-gray-400 hover:text-gray-600" data-toast-close aria-label="Close">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div class="px-4 py-3">
            Thank you for your feedback! We appreciate your input.
        </div>
    </div>
</div>
