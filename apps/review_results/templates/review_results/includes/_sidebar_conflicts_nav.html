<!-- Pending Discussions Navigation (Workflow #2 Only) -->
{% if session.current_configuration.is_workflow_2 and pending_conflicts_count %}
<div class="rounded-lg border border-warning bg-warning/5 shadow-sm mb-4"
    data-testid="conflicts-navigation-card">
    <a href="/screening/conflicts?session_id={{ session.id }}"
        class="flex items-center justify-between px-3 py-3 group hover:bg-warning/10 transition-colors rounded-lg">
        <div class="flex items-center gap-2">
            <svg class="w-3.5 h-3.5 text-warning-dark" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd"
                    d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd"></path>
            </svg>
            <span class="text-[10px] font-bold uppercase tracking-widest text-warning-dark">Discussions Needed</span>
        </div>
        <span class="inline-flex items-center justify-center min-w-[1.5rem] h-6 px-1.5 rounded-full bg-warning text-warning-dark text-xs font-bold">
            {{ pending_conflicts_count }}
        </span>
    </a>
</div>
{% endif %}
