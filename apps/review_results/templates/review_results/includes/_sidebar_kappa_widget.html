<!-- Cohen's Kappa Widget (Workflow #2 Only) -->
{% if session.current_configuration.is_workflow_2 %}
<div class="rounded-lg border border-border bg-white shadow-sm mb-4 kappa-widget-card"
    data-testid="kappa-widget-card">
    <div class="flex justify-between items-center px-3 py-2 border-b border-border bg-muted/30">
        <h6
            class="text-xs font-semibold text-foreground flex items-center uppercase tracking-widest text-muted-foreground text-[10px]">
            <svg class="w-3.5 h-3.5 mr-1.5 text-info" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd"
                    d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11.707 4.707a1 1 0 00-1.414-1.414L10 9.586 8.707 8.293a1 1 0 00-1.414 0l-2 2a1 1 0 101.414 1.414L8 10.414l1.293 1.293a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd"></path>
            </svg>
            Reliability (&kappa;)
        </h6>
        <button id="refresh-kappa-btn" data-testid="refresh-kappa-btn"
            class="inline-flex items-center px-2 py-1 text-[10px] uppercase tracking-widest font-bold rounded border border-info bg-white text-info-dark hover:bg-info-light"
            title="Refresh IRR metrics">
            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd"
                    d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                    clip-rule="evenodd"></path>
            </svg>
            Refresh
        </button>
    </div>
    <div class="p-4" id="kappa-widget">
        <!-- Widget content loaded by JavaScript -->
        <div class="text-center py-4">
            <div class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-primary border-r-transparent"
                role="status">
                <span class="sr-only">Loading...</span>
            </div>
            <p class="text-muted-foreground mt-2">Loading IRR metrics...</p>
        </div>
    </div>
</div>
{% endif %}
