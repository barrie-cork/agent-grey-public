# Staging Docker Compose for Agent Grey
#
# Production-like environment with local infrastructure for validation testing.
# This environment mirrors production security settings but uses local Docker services
# instead of managed databases for cost-effective staging validation.
#
# Usage:
# - Start staging: docker-compose -f docker-compose.staging.yml up -d --build
# - View logs: docker-compose -f docker-compose.staging.yml logs -f
# - Clean reset: docker-compose -f docker-compose.staging.yml down -v
#
# Key differences from development:
# - DEBUG=False (production-like)
# - Stricter security settings enabled
# - Production-optimised Docker builds
# - Separate staging database and Redis
# - Production-like logging and monitoring

# Explicit project name — see docker-compose.yml comment. Prevents collision
# with the deployed production stack (project=agent-grey).
name: agent-grey-staging

# Hardening (TH PMD #970, follow-up to a231848):
# - Host ports bound to 127.0.0.1 only — use an SSH tunnel for remote access.
# - debugpy 5678 intentionally not host-bound — use
#   `docker compose exec web python -m debugpy ...` if you need to attach.
# See .claude/rules/custom/deploy-verify.md and no-local-compose.md.

services:
  db_staging:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-thesis_grey_staging_db}
      - POSTGRES_USER=${POSTGRES_USER:-thesis_grey_staging_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set in .env.staging.local}
      # Enable UUID extension for PostgreSQL
      - POSTGRES_INITDB_ARGS=--auth-host=md5
    ports:
      - "127.0.0.1:5434:5432"  # Different port to avoid conflicts with development
    networks:
      - staging_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thesis_grey_staging_user} -d ${POSTGRES_DB:-thesis_grey_staging_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis_staging:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?set in .env.staging.local}
    volumes:
      - redis_staging_data:/data
    ports:
      - "127.0.0.1:6380:6379"  # Different port to avoid conflicts with development
    networks:
      - staging_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web_staging:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: staging
      cache_from:
        - python:3.12-slim
    command: production-server
    volumes:
      # NO live code reloading in staging - production-like behaviour
      - staging_media_volume:/app/media
      - staticfiles_staging_volume:/app/staticfiles
      # Share host time for synchronisation
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - "127.0.0.1:8200:8000"  # Different port for staging (8080 blocked by Windows/WSL2 reserved range 8015-8114)
    env_file:
      - .env.staging.local
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.staging
      - DATABASE_URL=postgres://${POSTGRES_USER:-thesis_grey_staging_user}:${POSTGRES_PASSWORD}@db_staging:5432/${POSTGRES_DB:-thesis_grey_staging_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis_staging:6379/0
      - ENVIRONMENT=staging
      - DEPLOYMENT_TYPE=docker
      - ENVIRONMENT_LOCKED=true  # Prevent runtime overrides
      - TZ=UTC
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,172.19.0.0/16,web_staging,staging.local
      # Production-like security settings
      - SECURE_SSL_REDIRECT=False  # Set to True when behind HTTPS proxy
      - SESSION_COOKIE_SECURE=False  # Set to True when using HTTPS
      - CSRF_COOKIE_SECURE=False  # Set to True when using HTTPS
      # Explicitly set SENTRY_DSN from .env.staging.local
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=staging
    depends_on:
      db_staging:
        condition: service_healthy
      redis_staging:
        condition: service_healthy
    networks:
      - staging_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker_staging:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: staging
      cache_from:
        - python:3.12-slim
    command: worker
    volumes:
      - staging_media_volume:/app/media
    env_file:
      - .env.staging.local
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.staging
      - DATABASE_URL=postgres://${POSTGRES_USER:-thesis_grey_staging_user}:${POSTGRES_PASSWORD}@db_staging:5432/${POSTGRES_DB:-thesis_grey_staging_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis_staging:6379/0
      - ENVIRONMENT=staging
      - DEPLOYMENT_TYPE=docker
      - ENVIRONMENT_LOCKED=true  # Prevent runtime overrides
      - CELERY_CONCURRENCY=4  # Production-like concurrency
      - TZ=UTC
      - WORKER_TYPE=celery
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=staging
    depends_on:
      db_staging:
        condition: service_healthy
      redis_staging:
        condition: service_healthy
    networks:
      - staging_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A grey_lit_project inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat_staging:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: staging
      cache_from:
        - python:3.12-slim
    command: beat
    volumes:
      - staging_media_volume:/app/media
    env_file:
      - .env.staging.local
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.staging
      - DATABASE_URL=postgres://${POSTGRES_USER:-thesis_grey_staging_user}:${POSTGRES_PASSWORD}@db_staging:5432/${POSTGRES_DB:-thesis_grey_staging_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis_staging:6379/0
      - TZ=UTC
      - WORKER_TYPE=web
      - ENVIRONMENT=staging
      - DEPLOYMENT_TYPE=docker
      - ENVIRONMENT_LOCKED=true  # Prevent runtime overrides
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=staging
    depends_on:
      db_staging:
        condition: service_healthy
      redis_staging:
        condition: service_healthy
      celery_worker_staging:
        condition: service_started
    networks:
      - staging_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; import sys; sys.exit(0 if 'beat' in ' '.join(os.popen('ps aux 2>/dev/null || echo celery-beat').read().split()) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx_staging:
    image: nginx:1.25-alpine
    volumes:
      - staging_media_volume:/app/media
      - staticfiles_staging_volume:/app/staticfiles
    ports:
      - "127.0.0.1:8201:80"  # Different port for staging nginx (avoiding Windows/WSL2 reserved range 8015-8114)
    depends_on:
      - web_staging
    networks:
      - staging_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command:
      - /bin/sh
      - -c
      - |
        rm -f /etc/nginx/conf.d/default.conf
        cat > /etc/nginx/nginx.conf <<'EOF'
        user nginx;
        worker_processes auto;
        error_log /var/log/nginx/error.log warn;
        pid /var/run/nginx.pid;

        events {
            worker_connections 1024;
        }

        http {
            include /etc/nginx/mime.types;
            default_type application/octet-stream;

            log_format main '$$remote_addr - $$remote_user [$$time_local] "$$request" '
                            '$$status $$body_bytes_sent "$$http_referer" '
                            '"$$http_user_agent" "$$http_x_forwarded_for"';

            access_log /var/log/nginx/access.log main;

            sendfile on;
            keepalive_timeout 65;

            # Rate limiting zone (must be in http context)
            limit_req_zone $$binary_remote_addr zone=api:10m rate=30r/m;

            upstream web_staging {
                server web_staging:8000;
            }

            server {
                listen 80;
                server_name localhost staging.local;
                client_max_body_size 100M;

                # Security headers (production-like)
                add_header X-Frame-Options DENY;
                add_header X-Content-Type-Options nosniff;
                add_header X-XSS-Protection "1; mode=block";
                add_header Referrer-Policy "strict-origin-when-cross-origin";
                add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

                location / {
                    proxy_pass http://web_staging;
                    proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                    proxy_set_header Host $$host;
                    proxy_set_header X-Real-IP $$remote_addr;
                    proxy_set_header X-Forwarded-Proto $$scheme;
                    proxy_redirect off;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;

                    # Rate limiting (production-like)
                    limit_req_status 429;
                    limit_req zone=api burst=10 nodelay;
                }

            location /static/ {
                alias /app/staticfiles/;
                expires 1y;
                add_header Cache-Control "public, immutable";
                gzip_static on;
            }

            location /media/ {
                alias /app/media/;
                expires 1y;
                add_header Cache-Control "public";
            }

            location /nginx-health {
                access_log off;
                return 200 "staging nginx healthy\n";
                add_header Content-Type text/plain;
            }

                # Enhanced gzip for production-like compression
                gzip on;
                gzip_vary on;
                gzip_min_length 10240;
                gzip_proxied expired no-cache no-store private any;
                gzip_types text/plain text/css text/js text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;
            }
        }
        EOF
        exec nginx -g 'daemon off;'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_staging_data:
  redis_staging_data:
  staging_media_volume:
  staticfiles_staging_volume:

networks:
  staging_network:
    driver: bridge

# Staging Environment Notes:
# - Uses separate ports to run alongside development environment
# - Production-like security settings but with local infrastructure
# - Separate volumes to ensure data isolation from development
# - Enhanced nginx configuration with security headers and rate limiting
# - Staging database and Redis for complete environment separation
#
# Access:
# - Application: http://localhost:8200
# - Nginx: http://localhost:8201
# - Database: localhost:5434
# - Redis: localhost:6380
#
# This environment is perfect for:
# - Pre-production validation
# - Security testing
# - Performance testing
# - Integration testing with production-like constraints
