# Agent Grey - Production Docker Compose
#
# 🚀 Production Deployment with DigitalOcean Managed Services
#
# Prerequisites:
# 1. Configure .env.production.local with DigitalOcean credentials
# 2. Ensure DATABASE_URL points to managed PostgreSQL
# 3. Ensure REDIS_URL points to managed Redis
#
# Build images:
#   docker-compose -f docker-compose.production.yml build --no-cache
#
# Deploy:
#   docker-compose -f docker-compose.production.yml up -d
#
# Django 5.2.7 Production - Build from local Dockerfiles

# Explicit project name — this file targets DigitalOcean managed services
# and should NOT run on the self-hosted production host, but setting an explicit name prevents
# accidental collision with the deployed production stack
# (project=agent-grey) if it ever does.
name: agent-grey-prod-do

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env.production.local
    environment:
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.production
    networks:
      - agent_grey_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
      target: production
    restart: unless-stopped
    command: /app/docker/celery_startup.sh
    volumes:
      - media_files:/app/media
    env_file:
      - .env.production.local
    environment:
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.production
      - CELERY_CONCURRENCY=${CELERY_CONCURRENCY:-2}
    networks:
      - agent_grey_network
    healthcheck:
      test: ["CMD-SHELL", "celery -A grey_lit_project inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
      target: production
    restart: unless-stopped
    command: /app/docker/celery_beat_startup.sh
    volumes:
      - media_files:/app/media
    env_file:
      - .env.production.local
    environment:
      - DJANGO_SETTINGS_MODULE=grey_lit_project.settings.production
    depends_on:
      - celery_worker
    networks:
      - agent_grey_network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; import sys; sys.exit(0 if 'beat' in ' '.join(os.popen('ps aux 2>/dev/null || echo celery-beat').read().split()) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - web
    networks:
      - agent_grey_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  media_files:
    driver: local
  static_files:
    driver: local

networks:
  agent_grey_network:
    driver: bridge

# Production deployment notes:
# - Uses DigitalOcean managed PostgreSQL (via DATABASE_URL in .env.production.local)
# - Uses DigitalOcean managed Redis (via REDIS_URL in .env.production.local)
# - Builds images locally with Django 5.2.7
# - No local db or redis containers (managed services only)
# - Nginx profile optional: --profile nginx to enable
#
# Environment Variables (set in .env.production.local):
# - DATABASE_URL (DigitalOcean PostgreSQL connection string)
# - REDIS_URL (DigitalOcean Redis connection string with SSL)
# - CELERY_BROKER_URL (usually same as REDIS_URL + /0)
# - CELERY_RESULT_BACKEND (usually same as REDIS_URL + /1)
# - SERPER_API_KEY (required for search functionality)
# - SECRET_KEY (Django secret key)
# - SENTRY_DSN (error monitoring)
# - ALLOWED_HOSTS (production domain)
# - CSRF_TRUSTED_ORIGINS (production domain with https://)
