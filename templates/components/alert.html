{# Reusable Alert Component - Tailwind CSS #}
{# Usage: include 'components/alert.html' with message="Success!" variant="success" dismissible=True #}
<div class="rounded-xl border-l-4 p-4 {% if variant == 'danger' or variant == 'error' %}border-destructive bg-destructive-light text-foreground{% elif variant == 'warning' %}border-warning bg-warning-light text-foreground{% elif variant == 'success' %}border-success bg-success-light text-foreground{% elif variant == 'info' %}border-info bg-info-light text-foreground{% else %}border-border bg-muted text-foreground{% endif %} {{ extra_classes|default:'' }}"
     {% if id %}id="{{ id }}"{% endif %}
     role="alert">
  <div class="flex items-start">
    {% if icon %}
      <div class="mr-3 flex-shrink-0">
        <i class="{{ icon }}" aria-hidden="true"></i>
      </div>
    {% endif %}
    <div class="flex-1">
      {% if title %}<h6 class="font-semibold mb-1">{{ title }}</h6>{% endif %}
      {{ message|safe }}
    </div>
    {% if dismissible %}
      <button type="button" class="ml-auto -mx-1.5 -my-1.5 rounded-lg p-1.5 hover:bg-white/50 focus:ring-2 focus:ring-current" data-dismiss-alert aria-label="Close">
        <span class="sr-only">Dismiss</span>
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
      </button>
    {% endif %}
  </div>
</div>
