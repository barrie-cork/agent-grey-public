{# Content Header - Sticky top bar with mobile sidebar toggle #}
<header class="sticky top-0 z-30 flex h-[56px] items-center gap-4 border-b border-border bg-background/95 backdrop-blur-sm px-6">
  {# Mobile sidebar toggle #}
  <button id="sidebar-toggle"
          type="button"
          class="inline-flex items-center justify-center rounded-lg p-2 text-muted-foreground hover:bg-muted hover:text-foreground focus:outline-none focus:ring-2 focus:ring-ring xl:hidden"
          aria-controls="sidebar"
          aria-expanded="false"
          aria-label="Toggle sidebar">
    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
    </svg>
  </button>

  {# Breadcrumbs slot #}
  <div class="flex-1 min-w-0">
    {% block content_header_breadcrumbs %}{% endblock %}
  </div>

  {# Actions slot #}
  <div class="flex items-center gap-2">
    {% block content_header_actions %}{% endblock %}
  </div>
</header>
