{% extends 'base.html' %}

{% block title %}Invitation Invalid - Agent Grey{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl px-4 sm:px-6 lg:px-8 py-8">
    <div class="rounded-lg border border-border bg-card shadow-sm">
        <div class="border-b border-border px-6 py-4">
            <h3 class="text-lg font-semibold text-foreground">Invitation No Longer Valid</h3>
        </div>
        <div class="px-6 py-4">
            {% include 'components/alert.html' with variant='danger' message=error %}
            <p class="mt-4 text-sm text-muted-foreground">
                Please ask the organisation owner to send you a new invitation.
            </p>
        </div>
    </div>
</div>
{% endblock %}
