name: Nightly Staging Validation

# Run comprehensive staging validation on a schedule
on:
  schedule:
    # Run at 2 AM UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/agent-grey

jobs:
  staging-validation:
    name: Comprehensive Staging Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Create staging environment file
      run: |
        cp .env.staging.example .env.staging.local
        echo "SERPER_API_KEY=${{ secrets.STAGING_SERPER_API_KEY || 'test-key' }}" >> .env.staging.local
        # Docker Compose resolves ${VAR} substitution from .env (not env_file).
        # Copy staging vars so db_staging/redis_staging get matching passwords.
        cp .env.staging.local .env

    - name: Start staging environment
      run: |
        docker compose -f docker-compose.staging.yml up -d --build

    - name: Wait for services
      run: |
        echo "Waiting for db_staging and redis_staging to become healthy..."
        timeout 120 bash -c 'until docker compose -f docker-compose.staging.yml ps db_staging --format json 2>/dev/null | grep -q healthy; do sleep 3; done'
        echo "db_staging is healthy"
        timeout 120 bash -c 'until docker compose -f docker-compose.staging.yml ps redis_staging --format json 2>/dev/null | grep -q healthy; do sleep 3; done'
        echo "redis_staging is healthy"
        echo "Waiting for web_staging to respond..."
        timeout 300 bash -c 'until curl -f http://localhost:8200/health/ >/dev/null 2>&1; do sleep 5; done'
        echo "web_staging is healthy"

    - name: Run staging health checks
      run: |
        # Check application health
        curl -f http://localhost:8200/health/
        echo "✅ Application health check passed"

        # Check admin interface
        curl -f http://localhost:8200/admin/
        echo "✅ Admin interface accessible"

        # Check static files
        curl -f http://localhost:8200/static/admin/css/base.css
        echo "✅ Static files serving"

        # Check nginx proxy
        curl -f http://localhost:8201/nginx-health
        echo "✅ Nginx proxy working"

    - name: Run functional tests
      run: |
        docker compose -f docker-compose.staging.yml exec -T web_staging python manage.py test apps.core.tests.test_health --verbosity=2
        docker compose -f docker-compose.staging.yml exec -T web_staging python manage.py check --deploy

    - name: Performance baseline
      run: |
        echo "## 🚀 Staging Performance Baseline" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Measure response times
        HEALTH_TIME=$(curl -o /dev/null -s -w "%{time_total}" http://localhost:8200/health/)
        ADMIN_TIME=$(curl -o /dev/null -s -w "%{time_total}" http://localhost:8200/admin/)

        echo "- **Health endpoint**: ${HEALTH_TIME}s" >> $GITHUB_STEP_SUMMARY
        echo "- **Admin interface**: ${ADMIN_TIME}s" >> $GITHUB_STEP_SUMMARY

    - name: Show staging logs
      if: always()
      run: |
        echo "=== Web Staging Logs ==="
        docker compose -f docker-compose.staging.yml logs --tail=100 web_staging
        echo "=== Database Staging Logs ==="
        docker compose -f docker-compose.staging.yml logs --tail=50 db_staging

    - name: Cleanup staging environment
      if: always()
      run: |
        docker compose -f docker-compose.staging.yml down -v

    - name: Notify on failure
      if: failure()
      run: |
        echo "## ❌ Nightly Staging Validation Failed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Please review the logs above for details." >> $GITHUB_STEP_SUMMARY
