name: Shared Setup Workflow

# Reusable workflow for common setup tasks
on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to set up'
        required: false
        type: string
        default: '3.12'
      install-dependencies:
        description: 'Which dependency file to install'
        required: false
        type: string
        default: 'local'
      setup-services:
        description: 'Whether to set up PostgreSQL and Redis services'
        required: false
        type: boolean
        default: false
      run-migrations:
        description: 'Whether to run database migrations'
        required: false
        type: boolean
        default: false
    outputs:
      python-cache-hit:
        description: 'Whether Python cache was hit'
        value: ${{ jobs.setup.outputs.cache-hit }}

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest

    outputs:
      cache-hit: ${{ steps.pip-cache.outputs.cache-hit }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: 'requirements/${{ inputs.install-dependencies }}.txt'

    - name: Cache pip packages
      id: pip-cache
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles(format('requirements/{0}.txt', inputs.install-dependencies)) }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          postgresql-client \
          libpq-dev \
          libpango-1.0-0 \
          libpangoft2-1.0-0 \
          libgdk-pixbuf-2.0-0 \
          libffi-dev \
          shared-mime-info

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/${{ inputs.install-dependencies }}.txt

    - name: Wait for services
      if: inputs.setup-services
      run: |
        timeout 60 bash -c 'until pg_isready -h localhost -p 5432; do sleep 1; done' || true
        timeout 60 bash -c 'until redis-cli -h localhost -p 6379 ping; do sleep 1; done' || true

    - name: Run migrations
      if: inputs.run-migrations
      env:
        DJANGO_SETTINGS_MODULE: grey_lit_project.settings.test
        SECRET_KEY: test-secret-key-for-github-actions
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
      run: |
        python manage.py migrate --noinput
        python manage.py createcachetable
